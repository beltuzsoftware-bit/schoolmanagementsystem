# Nginx configuration for KuMMi School Management System
server {
    listen 80;
    listen [::]:80;
    server_name school.example.com; # Replace with your domain

    # Redirect port 80 (HTTP) to 443 (HTTPS)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name school.example.com; # Replace with your domain

    # SSL Certificates (will be updated/configured by Certbot)
    # ssl_certificate /etc/letsencrypt/live/school.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/school.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_comp_level 5;

    # Forward request headers
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Next.js Static Asset Optimization
    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public/Static Assets
    location /public {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # Main Application Reverse Proxy
    location / {
        proxy_pass http://localhost:3000;
    }
}
