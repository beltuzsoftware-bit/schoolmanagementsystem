services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kummi-school-system
    restart: always
    ports:
      - "3000:3000"
    # Run as root so we can always write to data.json
    # (git pull on host recreates the file as root-owned on every deploy)
    user: "0:0"
    volumes:
      - ./data.json:/app/data.json
    environment:
      - PORT=3000
      - NODE_ENV=production
